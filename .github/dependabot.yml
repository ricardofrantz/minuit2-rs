# Dependabot automated dependency updates.
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2

updates:
  # Rust crates in Cargo.lock.
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    commit-message:
      prefix: deps
      include: scope
    labels:
      - dependencies
      - rust
    groups:
      # Cluster the pyo3 family into a single PR; a pyo3 bump typically
      # moves pyo3, pyo3-ffi, pyo3-macros, pyo3-macros-backend, and
      # pyo3-build-config in lockstep.
      pyo3:
        patterns:
          - "pyo3*"
      nalgebra:
        patterns:
          - "nalgebra*"
          - "simba*"
      rayon:
        patterns:
          - "rayon*"
          - "crossbeam*"

  # Third-party GitHub Actions (keeps the SHA pins in .github/workflows/
  # fresh; Dependabot rewrites the `uses:` line with a new SHA + tag
  # comment, which we can review and merge).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    commit-message:
      prefix: ci
      include: scope
    labels:
      - dependencies
      - github-actions
