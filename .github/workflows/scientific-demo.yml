name: Scientific Demo Benchmark

on:
  workflow_dispatch:
    inputs:
      runner:
        description: "Runner label"
        required: true
        default: "ubuntu-latest"
        type: choice
        options:
          - ubuntu-latest
          - self-hosted
      repeats:
        description: "Measured repeats per batch"
        required: true
        default: "41"
        type: string
      warmups:
        description: "Warmup repeats per batch"
        required: true
        default: "9"
        type: string
      bootstrap_iters:
        description: "Bootstrap iterations"
        required: true
        default: "5000"
        type: string
      permutation_iters:
        description: "Permutation-test iterations"
        required: true
        default: "10000"
        type: string
      batches:
        description: "Interleaved batches"
        required: true
        default: "9"
        type: string
      cpu_core:
        description: "Optional CPU core pin (Linux taskset only)"
        required: false
        default: ""
        type: string
      trim_fraction:
        description: "Trim fraction on each tail for robust stats"
        required: true
        default: "0.10"
        type: string
      strict_env:
        description: "Fail if environment checks flag critical issues"
        required: true
        default: true
        type: boolean
      auto_commit:
        description: "Commit and push updated benchmark artifacts"
        required: true
        default: false
        type: boolean

env:
  CARGO_TERM_COLOR: always

jobs:
  benchmark:
    name: Run scientific demos, tests, and benchmark
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install matplotlib

      - name: Fetch scientific demo data
        run: scripts/fetch_scientific_demo_data.sh

      - name: Run Rust tests
        run: cargo test --all-features
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"

      - name: Run benchmark + regenerate figures
        shell: bash
        env:
          REPEATS:    ${{ inputs.repeats }}
          WARMUPS:    ${{ inputs.warmups }}
          BOOT_ITERS: ${{ inputs.bootstrap_iters }}
          PERM_ITERS: ${{ inputs.permutation_iters }}
          BATCHES:    ${{ inputs.batches }}
          CPU_CORE:   ${{ inputs.cpu_core }}
          TRIM:       ${{ inputs.trim_fraction }}
          STRICT_ENV: ${{ inputs.strict_env }}
        run: |
          # Validate user-supplied inputs before they reach the benchmark script.
          for var in REPEATS WARMUPS BOOT_ITERS PERM_ITERS BATCHES; do
            v="${!var}"
            [[ "$v" =~ ^[0-9]+$ ]] \
              || { echo "::error::$var must be a non-negative integer (got: $v)"; exit 1; }
          done
          [[ "$TRIM" =~ ^[0-9]+(\.[0-9]+)?$ ]] \
            || { echo "::error::TRIM must be a decimal (got: $TRIM)"; exit 1; }
          if [[ -n "$CPU_CORE" ]]; then
            [[ "$CPU_CORE" =~ ^[0-9]+$ ]] \
              || { echo "::error::CPU_CORE must be empty or a non-negative integer (got: $CPU_CORE)"; exit 1; }
          fi

          strict=0
          if [[ "$STRICT_ENV" == "true" ]]; then
            strict=1
          fi
          bash examples/run_comparison.sh \
            "$REPEATS" \
            "$WARMUPS" \
            "$BOOT_ITERS" \
            "$PERM_ITERS" \
            "$BATCHES" \
            "$CPU_CORE" \
            "$TRIM" \
            "$strict"

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: scientific-demo-benchmark-${{ github.run_id }}
          path: |
            examples/comparison.png
            examples/output/comparison_timings.csv
            examples/output/comparison_samples.csv
            examples/output/comparison_environment.json
          retention-days: 30
          if-no-files-found: error

  commit-artifacts:
    name: Commit updated benchmark artifacts
    needs: benchmark
    if: ${{ inputs.auto_commit }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download benchmark artifacts
        uses: actions/download-artifact@v4
        with:
          name: scientific-demo-benchmark-${{ github.run_id }}
          path: /tmp/scientific-demo-artifacts

      - name: Stage artifacts into worktree
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p examples/output
          for f in comparison.png comparison_timings.csv comparison_samples.csv comparison_environment.json; do
            src="$(find /tmp/scientific-demo-artifacts -type f -name "$f" -print -quit)"
            if [[ -z "$src" ]]; then
              echo "::error::artifact $f not found in downloaded bundle" >&2
              exit 1
            fi
            case "$f" in
              comparison.png)
                dst="examples/comparison.png" ;;
              *)
                dst="examples/output/$f" ;;
            esac
            cp "$src" "$dst"
          done

      - name: Commit refreshed artifacts
        shell: bash
        run: |
          if git diff --quiet -- \
            examples/comparison.png \
            examples/output/comparison_timings.csv \
            examples/output/comparison_samples.csv \
            examples/output/comparison_environment.json; then
            echo "No benchmark artifact changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add examples/comparison.png
          git add examples/output/comparison_timings.csv
          git add examples/output/comparison_samples.csv
          git add examples/output/comparison_environment.json

          git commit -m "ci: refresh scientific benchmark artifacts [skip ci]"
          git push
